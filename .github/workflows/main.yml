name: Update VLESS Best

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download source list
        run: |
          curl -L -o source.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Ping + sort Russia and Anycast
        run: |
          check_proxies () {
            input=$1
            output=$2

            > $output

            while IFS= read -r line; do
              host=$(echo "$line" | sed -n 's/.*@\([^:]*\):\([0-9]*\).*/\1/p')
              port=$(echo "$line" | sed -n 's/.*@\([^:]*\):\([0-9]*\).*/\2/p')

              if [ -n "$host" ] && [ -n "$port" ]; then
                start=$(date +%s%3N)
                if nc -z -w 2 "$host" "$port"; then
                  end=$(date +%s%3N)
                  ping=$((end-start))
                  echo "$ping $line" >> $output
                fi
              fi
            done < $input
          }

          # --- Russia ---
          grep -i "russia" source.txt | sort -u > russia.txt
          check_proxies russia.txt russia_ping.txt
          sort -n russia_ping.txt | head -n 4 | awk '{ $1=""; print substr($0,2) }' > russia_best.txt

          # --- Anycast ---
          grep -i "anycast" source.txt | sort -u > anycast.txt
          check_proxies anycast.txt anycast_ping.txt
          sort -n anycast_ping.txt | head -n 4 | awk '{ $1=""; print substr($0,2) }' > anycast_best.txt

          # --- объединяем ---
          cat russia_best.txt anycast_best.txt > final.txt

          # создаём итоговый файл
          echo "# profile-title: 🇷🇺 КАМЕНКА🇷🇺" > Vless-Reality-White-Lists-Rus-Mobile-2.txt
          echo "# profile-update-interval: 3" >> Vless-Reality-White-Lists-Rus-Mobile-2.txt
          echo "" >> Vless-Reality-White-Lists-Rus-Mobile-2.txt
          cat final.txt >> Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Commit and push
        env:
          MY_GITHUB_PAT: ${{ secrets.MY_GITHUB_PAT }}
        run: |
          git config --global user.name "rankedcs"
          git config --global user.email "qwertyuiop7017@mail.ru"

          git add Vless-Reality-White-Lists-Rus-Mobile-2.txt
          git commit -m "Auto update best Russia+Anycast $(date +'%Y-%m-%d %H:%M')" || echo "No changes"

          git remote set-url origin https://rankedcs:${MY_GITHUB_PAT}@github.com/rankedcs/Myvlesses.git
          git pull --rebase origin main
          git push origin HEAD:main
