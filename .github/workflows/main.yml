name: Safe Update Russia VLESS v2

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y grep timeout sort uniq

      - name: Download source VLESS list
        run: |
          curl -L -o source.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Filter only Russia proxies
        run: |
          grep -i "russia" source.txt > filtered.txt || touch filtered.txt
          sort -u filtered.txt -o filtered.txt

      - name: Safe proxy check
        run: |
          # Создаем пустой файл
          > working.txt

          # Функция для безопасного TCP check
          safe_check() {
            local host=$1
            local port=$2
            timeout 3 bash -c "</dev/tcp/$host/$port" 2>/dev/null && return 0 || return 1
          }

          total=0
          ok=0

          if [ ! -s filtered.txt ]; then
            echo "No Russia proxies found, skipping TCP check"
            cp filtered.txt working.txt
          else
            while IFS= read -r line; do
              total=$((total+1))
              host=$(echo "$line" | sed -n 's/.*@\([^:]*\):.*/\1/p')
              port=$(echo "$line" | sed -n 's/.*:\([0-9]*\).*/\1/p')

              if [ -n "$host" ] && [ -n "$port" ]; then
                if safe_check "$host" "$port"; then
                  echo "$line" >> working.txt
                  ok=$((ok+1))
                fi
              fi
            done < filtered.txt
          fi

          echo "Total proxies checked: $total"
          echo "Working proxies: $ok"

      - name: Update repository file
        run: mv working.txt Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Vless-Reality-White-Lists-Rus-Mobile-2.txt
          git commit -m "Safe auto-update Russia VLESS $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push

      - name: Log total working proxies
        run: |
          count=$(wc -l < Vless-Reality-White-Lists-Rus-Mobile-2.txt)
          echo "Total working Russia proxies: $count"
