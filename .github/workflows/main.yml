name: Update Russia VLESS

on:
  schedule:
    - cron: "0 */6 * * *"  # каждые 6 часов
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y grep timeout sort uniq

      - name: Download source VLESS list
        run: |
          curl -L -o source.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Filter only Russia proxies
        run: |
          grep -i "russia" source.txt > filtered.txt

      - name: Remove duplicates and sort
        run: |
          sort -u filtered.txt -o filtered.txt

      - name: Check proxies (basic TCP check)
        run: |
          > working.txt
          while read line; do
            # Попытка извлечь хост и порт (предположим формат: user@host:port)
            host=$(echo $line | sed -n 's/.*@\([^:]*\):.*/\1/p')
            port=$(echo $line | sed -n 's/.*:\([0-9]*\).*/\1/p')

            # Проверяем открытый порт
            if [ -n "$host" ] && [ -n "$port" ]; then
              if timeout 3 bash -c "</dev/tcp/$host/$port" 2>/dev/null; then
                echo $line >> working.txt
              fi
            fi
          done < filtered.txt

      - name: Update repository file
        run: |
          mv working.txt Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add Vless-Reality-White-Lists-Rus-Mobile-2.txt
          git commit -m "Auto-update Russia VLESS $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push

      - name: Log total working proxies
        run: |
          count=$(wc -l < Vless-Reality-White-Lists-Rus-Mobile-2.txt)
          echo "Total working Russia proxies: $count"
