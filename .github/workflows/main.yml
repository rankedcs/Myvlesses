name: Update Russia VLESS

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download source list
        run: |
          curl -L -o source.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Filter Russia proxies
        run: |
          grep -i "russia" source.txt | sort -u > temp.txt

          # заменяем Russia → Россия
          sed 's/Russia/Россия/gI' temp.txt > proxies.txt

          # создаём итоговый файл
          echo "# profile-title: 🇷🇺 КАМЕНКА🇷🇺" > Vless-Reality-White-Lists-Rus-Mobile-2.txt
          echo "# profile-update-interval: 3" >> Vless-Reality-White-Lists-Rus-Mobile-2.txt
          echo "" >> Vless-Reality-White-Lists-Rus-Mobile-2.txt

          cat proxies.txt >> Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Commit and push
        env:
          MY_GITHUB_PAT: ${{ secrets.MY_GITHUB_PAT }}
        run: |
          git config --global user.name "rankedcs"
          git config --global user.email "qwertyuiop7017@mail.ru"

          git add Vless-Reality-White-Lists-Rus-Mobile-2.txt
          git commit -m "Auto update Russia VLESS $(date +'%Y-%m-%d %H:%M')" || echo "No changes"

          git remote set-url origin https://rankedcs:${MY_GITHUB_PAT}@github.com/rankedcs/Myvlesses.git

          git pull --rebase origin main
          git push origin HEAD:main
