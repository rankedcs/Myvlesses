name: Обновление прокси в ВК Документах

on:
  schedule:
    # Запускается каждый час
    - cron: '0 * * * *'
  workflow_dispatch:  # Можно запускать вручную

jobs:
  update-proxy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v3
      
      - name: Установка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Установка зависимостей Python
        run: |
          pip install requests
      
      - name: Сбор прокси из источника
        run: |
          python -c "
import requests
import re
from datetime import datetime

print('🔄 Скачиваем прокси из источника...')

# Источник 1: Ваш GitHub файл
url = 'https://raw.githubusercontent.com/rankedcs/Myvlesses/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt'

try:
    response = requests.get(url, timeout=30)
    response.raise_for_status()
    
    content = response.text
    print(f'✅ Скачано {len(content.splitlines())} строк')
    
    # Фильтруем только vless строки
    lines = content.splitlines()
    vless_lines = [line for line in lines if line.startswith('vless://')]
    
    # Добавляем заголовок с датой
    header = '# profile-title: 🇷🇺 АВТО-ОБНОВЛЯЕМЫЙ СПИСОК 🇷🇺\n'
    header += '# profile-update-interval: 1\n'
    header += f'# Обновлено: {datetime.now().strftime(\"%Y-%m-%d %H:%M:%S\")}\n'
    header += f'# Всего прокси: {len(vless_lines)}\n\n'
    
    final_content = header + '\n'.join(vless_lines)
    
    # Сохраняем файл
    with open('proxy.txt', 'w', encoding='utf-8') as f:
        f.write(final_content)
    
    print(f'✅ Сохранено {len(vless_lines)} рабочих прокси')
    print(f'📁 Файл: proxy.txt')
    
except Exception as e:
    print(f'❌ Ошибка: {e}')
    exit(1)
"
      
      - name: Загрузка в ВК Документы
        env:
          VK_LOGIN: ${{ secrets.VK_LOGIN }}
          VK_PASSWORD: ${{ secrets.VK_PASSWORD }}
        run: |
          python -c "
import requests
import time
import os
from selenium import webdriver
from selenium.webdriver.common.by import By
from selenium.webdriver.support.ui import WebDriverWait
from selenium.webdriver.support import expected_conditions as EC
from selenium.webdriver.chrome.options import Options

print('🚀 Запускаем браузер...')

# Настройки Chrome
chrome_options = Options()
chrome_options.add_argument('--headless')
chrome_options.add_argument('--no-sandbox')
chrome_options.add_argument('--disable-dev-shm-usage')
chrome_options.add_argument('--window-size=1920,1080')

# Запускаем драйвер
driver = webdriver.Chrome(options=chrome_options)

try:
    # 1. Открываем ВК
    print('1️⃣ Открываем VK...')
    driver.get('https://vk.com')
    time.sleep(3)
    
    # 2. Логинимся
    print('2️⃣ Логинимся...')
    
    # Вводим логин
    login_input = WebDriverWait(driver, 10).until(
        EC.presence_of_element_located((By.NAME, 'email'))
    )
    login_input.send_keys(os.environ['VK_LOGIN'])
    
    # Вводим пароль
    password_input = driver.find_element(By.NAME, 'pass')
    password_input.send_keys(os.environ['VK_PASSWORD'])
    
    # Нажимаем кнопку входа
    login_button = driver.find_element(By.CSS_SELECTOR, 'button[type=\"submit\"]')
    login_button.click()
    
    time.sleep(5)
    
    # 3. Переходим в Документы
    print('3️⃣ Переходим в Документы...')
    driver.get('https://vk.com/docs')
    time.sleep(5)
    
    # 4. Ищем кнопку загрузки
    print('4️⃣ Загружаем файл...')
    
    # Пробуем найти кнопку \"Загрузить\"
    try:
        upload_button = WebDriverWait(driver, 10).until(
            EC.element_to_be_clickable((By.CSS_SELECTOR, '.docs_add_btn, #docs_add_btn, button[onclick*=\"showUploadBox\"]'))
        )
        upload_button.click()
        time.sleep(2)
    except:
        print('Кнопка не найдена, пробуем JavaScript...')
        driver.execute_script('Docs.showUploadBox()')
        time.sleep(2)
    
    # 5. Загружаем файл
    file_input = WebDriverWait(driver, 10).until(
        EC.presence_of_element_located((By.CSS_SELECTOR, 'input[type=\"file\"]'))
    )
    file_input.send_keys(os.path.abspath('proxy.txt'))
    
    print('✅ Файл загружен!')
    time.sleep(5)
    
    # 6. Если спросит про замену - подтверждаем
    try:
        replace_button = WebDriverWait(driver, 5).until(
            EC.element_to_be_clickable((By.CSS_SELECTOR, '.flat_button_primary'))
        )
        replace_button.click()
        print('✅ Файл заменен!')
        time.sleep(2)
    except:
        print('✅ Новый файл создан!')
    
    # 7. Получаем прямую ссылку
    print('5️⃣ Получаем прямую ссылку...')
    driver.get('https://vk.com/docs')
    time.sleep(3)
    
    # Ищем наш файл и кликаем на него
    files = driver.find_elements(By.CSS_SELECTOR, '.doc_row')
    for file in files:
        if 'proxy.txt' in file.text:
            file.click()
            time.sleep(2)
            break
    
    # Ищем кнопку скачивания и копируем ссылку
    download_links = driver.find_elements(By.CSS_SELECTOR, 'a[href*=\"userapi.com\"], a[download]')
    
    direct_url = None
    for link in download_links:
        url = link.get_attribute('href')
        if url and 'userapi.com' in url:
            direct_url = url
            break
    
    if direct_url:
        print(f'✅ Прямая ссылка: {direct_url}')
        # Сохраняем ссылку в файл
        with open('direct_link.txt', 'w') as f:
            f.write(direct_url)
    else:
        print('⚠️ Не удалось получить прямую ссылку')
    
except Exception as e:
    print(f'❌ Ошибка: {e}')
    exit(1)
    
finally:
    driver.quit()
"
      
      - name: Сохраняем прямую ссылку
        run: |
          if [ -f direct_link.txt ]; then
            echo "🔗 Прямая ссылка для H.A.P.P.:"
            cat direct_link.txt
          fi
